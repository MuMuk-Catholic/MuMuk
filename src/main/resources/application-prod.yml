spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/mumuk
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8080
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    url: /api/v3/api-docs
    config-url: /api/v3/api-docs/swagger-config

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
