spring:
  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    format_sql: true

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  tomcat:
    max-threads: 200              # 운영 인스턴스와 동일하게 유지
    accept-count: 100
    mbeanregistry:
      enabled: true


jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY}    # 1시간
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY}  # 2주

app:
  env: local
  ocr:
    max-retries: 3
    retry-delay-ms: 2000
    enable-image-preprocessing: true
    enable-multi-template: true
    confidence-threshold: 0.7



