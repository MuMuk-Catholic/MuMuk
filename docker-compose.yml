services:
  backend:
    image: mumuk-backend:latest
    container_name: mumuk-backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mumuk-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: mumuk-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME:-mumuk}
      - POSTGRES_USER=${DB_USERNAME:-mumuk}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - mumuk-postgres-data:/var/lib/postgresql/data
    networks:
      - mumuk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mumuk}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mumuk-redis
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - mumuk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: mumuk-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - mumuk-network
    restart: unless-stopped

volumes:
  mumuk-postgres-data:

networks:
  mumuk-network:
    driver: bridge
